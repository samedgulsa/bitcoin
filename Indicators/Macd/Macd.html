<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MACD Pro Terminal - Modüler</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --container-bg: #1e2329;
            --text-color: #eaecef;
            --binance-yellow: #f0b90b;
            --macd-line: #2962FF;
            --signal-line: #FF6D00;
            --hist-up: #26a69a;
            --hist-down: #ef5350;
            --grid-color: #2b2f36;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        .dashboard {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header { 
            padding: 15px 25px; 
            background: var(--container-bg); 
            border-bottom: 1px solid var(--grid-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        h1 { margin: 0; font-size: 1.2rem; color: var(--binance-yellow); }
        #status { font-size: 0.85rem; color: #848e9c; }

        .canvas-container { 
            flex-grow: 1; 
            position: relative; 
            background: var(--bg-color); 
        }

        canvas { cursor: crosshair; }

        #data-overlay {
            position: absolute; 
            top: 20px; 
            left: 20px;
            background: rgba(30, 35, 41, 0.8); 
            padding: 12px;
            border: 1px solid var(--grid-color); 
            border-radius: 8px;
            pointer-events: none; 
            min-width: 160px;
            font-size: 13px;
            backdrop-filter: blur(4px);
        }

        .val-row { display: flex; justify-content: space-between; margin: 4px 0; }
        .m-color { color: var(--macd-line); font-weight: bold; } 
        .s-color { color: var(--signal-line); font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>15m MACD</h1>
        <div id="status">Veri Bekleniyor...</div>
    </div>
    
    <div class="canvas-container">
        <canvas id="terminal"></canvas>
        <div id="data-overlay">
            <div class="val-row"><span>MACD:</span> <span id="m-val" class="m-color">0.00</span></div>
            <div class="val-row"><span>Sinyal:</span> <span id="s-val" class="s-color">0.00</span></div>
            <div class="val-row"><span>Hist:</span> <span id="h-val">0.00</span></div>
        </div>
    </div>
</div>

<script>
/**
 * 1. YAPILANDIRMA VE RENKLER
 */
const CONFIG = {
    symbol: 'BTCUSDT',
    interval: '15m',
    limit: 1000,
    displayLimit: 200, // Ekranda gösterilecek son mum sayısı
    colors: {
        macd: "#2962FF",
        signal: "#FF6D00",
        histUp: "#26a69a",
        histDown: "#ef5350",
        grid: "#2b2f36",
        crosshair: "rgba(255, 255, 255, 0.3)"
    }
};

/**
 * 2. MATEMATİK MOTORU (Dokunulmadı)
 */
const MACDEngine = {
    calculateEMA(data, period) {
        const k = 2 / (period + 1);
        let ema = [data[0]];
        for (let i = 1; i < data.length; i++) {
            ema.push(data[i] * k + ema[i - 1] * (1 - k));
        }
        return ema;
    },
    getMACDData(prices, fast = 12, slow = 26, signal = 9) {
        const emaFast = this.calculateEMA(prices, fast);
        const emaSlow = this.calculateEMA(prices, slow);
        const macdLine = emaFast.map((v, i) => v - emaSlow[i]);
        const signalLine = this.calculateEMA(macdLine, signal);
        return macdLine.map((m, i) => ({
            m: m,
            s: signalLine[i],
            h: m - signalLine[i]
        }));
    }
};

/**
 * 3. GÖRSEL EKLENTİLER (Crosshair & Grid)
 */
const ChartPlugins = {
    drawCrosshair(ctx, x, y, w, h) {
        ctx.save();
        ctx.strokeStyle = CONFIG.colors.crosshair;
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;

        // Dikey
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        // Yatay
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        ctx.restore();
    },
    drawZeroLine(ctx, midY, w) {
        ctx.save();
        ctx.strokeStyle = CONFIG.colors.grid;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(w, midY); ctx.stroke();
        ctx.restore();
    }
};

/**
 * 4. ÇİZİM ÇEKİRDEĞİ
 */
const canvas = document.getElementById('terminal');
const ctx = canvas.getContext('2d');
let chartData = [];

function resize() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    if(chartData.length > 0) render(chartData);
}

window.onresize = resize;
resize();

function render(data, mouseX = -1, mouseY = -1) {
    const w = canvas.width, h = canvas.height, midY = h / 2;
    const step = w / data.length;
    
    ctx.clearRect(0, 0, w, h);
    ChartPlugins.drawZeroLine(ctx, midY, w);

    const maxVal = Math.max(...data.map(d => Math.max(Math.abs(d.m), Math.abs(d.s), Math.abs(d.h)))) * 1.2;
    const scale = (h / 2) / maxVal;

    // 1. Histogram Çizimi
    data.forEach((d, i) => {
        const x = i * step;
        ctx.fillStyle = d.h >= 0 ? CONFIG.colors.histUp : CONFIG.colors.histDown;
        ctx.globalAlpha = 0.6;
        const barH = d.h * scale;
        ctx.fillRect(x + 1, midY, step - 2, -barH);
    });
    ctx.globalAlpha = 1.0;

    // 2. Çizgi Çizme Fonksiyonu
    const drawPath = (prop, color) => {
        ctx.beginPath(); 
        ctx.strokeStyle = color; 
        ctx.lineWidth = 2;
        ctx.lineJoin = "round";
        data.forEach((d, i) => {
            const x = i * step + step/2, y = midY - (d[prop] * scale);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
    };

    drawPath('m', CONFIG.colors.macd);
    drawPath('s', CONFIG.colors.signal);

    // 3. Etkileşim (Crosshair & Overlay Update)
    if (mouseX > 0) {
        ChartPlugins.drawCrosshair(ctx, mouseX, mouseY, w, h);
        const idx = Math.floor(mouseX / step);
        if (data[idx]) {
            updateOverlay(data[idx]);
        }
    }
}

function updateOverlay(d) {
    document.getElementById('m-val').innerText = d.m.toFixed(4);
    document.getElementById('s-val').innerText = d.s.toFixed(4);
    const hEl = document.getElementById('h-val');
    hEl.innerText = d.h.toFixed(4);
    hEl.style.color = d.h >= 0 ? CONFIG.colors.histUp : CONFIG.colors.histDown;
}

canvas.addEventListener('mousemove', (e) => {
    if(!chartData.length) return;
    const rect = canvas.getBoundingClientRect();
    render(chartData, e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener('mouseleave', () => {
    if(chartData.length) render(chartData);
});

/**
 * 5. BAŞLATICI
 */
async function start() {
    try {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${CONFIG.symbol}&interval=${CONFIG.interval}&limit=${CONFIG.limit}`);
        const json = await res.json();
        const prices = json.map(d => parseFloat(d[4]));
        
        // Veriyi işle ve son displayLimit kadarını al
        chartData = MACDEngine.getMACDData(prices).slice(-CONFIG.displayLimit);
        
        document.getElementById('status').innerText = "CANLI VERİ BAĞLANDI";
        render(chartData);
    } catch (e) {
        document.getElementById('status').innerText = "BAĞLANTI HATASI";
    }
}

start();
</script>
</body>
</html>
