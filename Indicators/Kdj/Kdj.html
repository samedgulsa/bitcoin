<!DOCTYPE html>
<html>
<head>
    <title>Binance KDJ - 400 Mum & Crosshair</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; margin: 0; padding: 20px; }
        .chart-container { width: 95%; margin: auto; height: 600px; position: relative; }
        
        /* KDJ Değerleri İçin Köşe Paneli */
        #kdjValues {
            position: absolute;
            top: 10px;
            left: 50px;
            background: rgba(30, 30, 30, 0.8);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #333;
            z-index: 10;
            pointer-events: none; /* Fare etkileşimini engelle */
            font-size: 14px;
            line-height: 1.6;
        }
        #kdjValues span { font-weight: bold; }
        #valK { color: white; }
        #valD { color: yellow; }
        #valJ { color: magenta; }
    </style>
</head>
<body>

    <div class="chart-container">
        <div id="kdjValues">
            K: <span id="valK">--</span><br>
            D: <span id="valD">--</span><br>
            J: <span id="valJ">--</span>
        </div>
        <canvas id="kdjChart"></canvas>
    </div>

<script>
async function init() {
    const symbol = "BTCUSDT";
    const interval = "15m";
    const limit = 400; // Limit 400 yapıldı
    const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;

    const res = await fetch(url);
    const raw = await res.json();

    const data = raw.map(d => ({
        time: new Date(d[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        high: parseFloat(d[2]),
        low: parseFloat(d[3]),
        close: parseFloat(d[4])
    }));

    // KDJ Hesaplama (Aynı Mantık)
    let K = 50, D = 50;
    const kdjData = data.map((m, i) => {
        if (i < 9) return { K: 50, D: 50, J: 50 };
        const last9 = data.slice(i - 8, i + 1);
        const hh = Math.max(...last9.map(x => x.high));
        const ll = Math.min(...last9.map(x => x.low));
        const rsv = hh === ll ? 50 : ((m.close - ll) / (hh - ll)) * 100;
        K = (2/3) * K + (1/3) * rsv;
        D = (2/3) * D + (1/3) * K;
        return { K, D, J: 3 * K - 2 * D };
    });

    // Köşedeki DOM elementlerini seç
    const elK = document.getElementById('valK');
    const elD = document.getElementById('valD');
    const elJ = document.getElementById('valJ');

    const ctx = document.getElementById('kdjChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.map(d => d.time),
            datasets: [
                { label: 'K', data: kdjData.map(r => r.K), borderColor: 'white', borderWidth: 1, pointRadius: 0, tension: 0.1 },
                { label: 'D', data: kdjData.map(r => r.D), borderColor: 'yellow', borderWidth: 1, pointRadius: 0, tension: 0.1 },
                { label: 'J', data: kdjData.map(r => r.J), borderColor: 'magenta', borderWidth: 1.5, pointRadius: 0, tension: 0.1 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index', // Aynı X eksenindeki tüm verileri seç
                intersect: false // Fare tam çizginin üzerinde olmasa da çalış
            },
            plugins: {
                legend: { display: false }, // Üstteki lejantı gizle (köşede var zaten)
                tooltip: {
                    enabled: true,
                    external: function(context) {
                        // Tooltip her güncellendiğinde bu fonksiyon çalışır
                        const tooltipModel = context.tooltip;
                        
                        if (tooltipModel.opacity === 0) {
                            return; // Tooltip gizliyse bir şey yapma
                        }

                        // O andaki verinin index'ini al
                        const dataIndex = tooltipModel.dataPoints[0].dataIndex;
                        const v = kdjData[dataIndex];

                        // Köşedeki paneli güncelle (virgülden sonra 2 basamak)
                        elK.innerText = v.K.toFixed(2);
                        elD.innerText = v.D.toFixed(2);
                        elJ.innerText = v.J.toFixed(2);
                    }
                }
            },
            scales: {
                y: { grid: { color: '#333' }, min: -20, max: 120 }, // J çizgisi için ekseni biraz genişlet
                x: { ticks: { maxTicksLimit: 15 }, grid: { display: false } }
            }
        }
    });
}

init();
</script>
</body>
</html>
